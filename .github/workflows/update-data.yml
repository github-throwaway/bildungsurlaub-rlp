name: Veranstaltungsdaten aktualisieren

on:
  schedule:
    - cron: "0 4 * * 1" # montags 04:00 UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Scraper ausführen
        run: uv run scraper/scrape.py
      - name: Änderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/events.json scraper/geocache.json
          git diff --cached --quiet || git commit -m "Veranstaltungsdaten aktualisieren"
          git push
