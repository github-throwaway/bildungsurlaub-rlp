<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bildungsurlaub-Finder RLP</title>
  <meta name="description" content="Alternatives Frontend für die Suche nach anerkannten Bildungsurlaub-Veranstaltungen in Rheinland-Pfalz – mit Karte, Volltextsuche und flexiblen Filtern.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🎓</text></svg>">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <h1>🎓 Bildungsurlaub-Finder <span class="rlp">RLP</span></h1>
    <p class="subtitle">Anerkannte Veranstaltungen nach dem Bildungsfreistellungsgesetz Rheinland-Pfalz
      — Daten: <a href="https://awv.rlp.de/suche/" target="_blank" rel="noopener">awv.rlp.de</a>
      <span id="data-date"></span></p>
  </header>

  <section class="filters" id="filters">
    <div class="filter-row">
      <input type="search" id="f-text" class="search-input" placeholder="🔍 Suche in Titel, Ort, Veranstalter …" autocomplete="off">
      <div class="chip-group" id="f-region">
        <button class="chip active" data-value="">Alle Regionen</button>
        <button class="chip" data-value="rlp">Rheinland-Pfalz</button>
        <button class="chip" data-value="bundesland">Anderes Bundesland</button>
        <button class="chip" data-value="ausland">Ausland</button>
      </div>
    </div>
    <div class="filter-row">
      <label class="field">
        <span>Land</span>
        <select id="f-land"><option value="">Alle Länder</option></select>
      </label>
      <label class="field">
        <span>Kategorie</span>
        <select id="f-cat"><option value="">Alle Kategorien</option></select>
      </label>
      <label class="field">
        <span>Veranstalter</span>
        <select id="f-org"><option value="">Alle Veranstalter</option></select>
      </label>
      <label class="field">
        <span>Von</span>
        <input type="date" id="f-von">
      </label>
      <label class="field">
        <span>Bis</span>
        <input type="date" id="f-bis">
      </label>
      <label class="field">
        <span>Dauer</span>
        <select id="f-dauer">
          <option value="">Beliebig</option>
          <option value="1-2">1–2 Tage</option>
          <option value="3-3">3 Tage</option>
          <option value="4-5">4–5 Tage</option>
          <option value="6-10">6–10 Tage</option>
          <option value="11-99">Mehr als 10 Tage</option>
        </select>
      </label>
    </div>
    <div class="filter-row filter-row--meta">
      <label class="checkbox"><input type="checkbox" id="f-typ" checked> Wiederholbare Veranstaltungen einbeziehen (Typenanerkennung)</label>
      <label class="checkbox"><input type="checkbox" id="f-bbox"> Nur sichtbaren Kartenausschnitt</label>
      <span class="spacer"></span>
      <span id="active-cat" class="cat-chip" hidden></span>
      <span id="count" class="count"></span>
      <button id="reset" class="reset-btn">Filter zurücksetzen</button>
    </div>
  </section>

  <main class="content">
    <div id="mindmap-view">
      <svg id="mindmap"></svg>
      <div id="mm-hint">Thema anklicken = aufklappen · Unterthema anklicken = Veranstaltungen ansehen · gestrichelte Linien = thematische Überschneidung · Ziehen/Scrollen = verschieben/zoomen</div>
      <aside id="mm-panel" hidden>
        <header>
          <strong id="mm-panel-title"></strong>
          <button id="mm-panel-close" title="Schließen">✕</button>
        </header>
        <div class="panel-actions">
          <button id="mm-to-list">📋 In Liste öffnen</button>
          <button id="mm-to-map">🗺️ Auf Karte zeigen</button>
        </div>
        <div id="mm-panel-list" class="list"></div>
      </aside>
    </div>
    <div id="map"></div>
    <aside class="results">
      <div class="results-head">
        <label class="field field--inline">
          <span>Sortierung</span>
          <select id="sort">
            <option value="start">Datum ↑</option>
            <option value="tage">Dauer ↓</option>
            <option value="ort">Ort A–Z</option>
            <option value="title">Titel A–Z</option>
          </select>
        </label>
      </div>
      <div id="list" class="list"></div>
      <button id="more" class="more-btn" hidden>Mehr anzeigen</button>
    </aside>
  </main>

  <nav class="view-tabs">
    <button id="tab-mm" class="active">🧠 Entdecken</button>
    <button id="tab-map"><span class="lbl-desktop">🗺️ Karte &amp; Liste</span><span class="lbl-mobile">🗺️ Karte</span></button>
    <button id="tab-list">📋 Liste</button>
  </nav>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/d3@7.9.0/dist/d3.min.js"></script>
  <script src="taxonomy.js"></script>
  <script src="app.js"></script>
</body>
</html>
